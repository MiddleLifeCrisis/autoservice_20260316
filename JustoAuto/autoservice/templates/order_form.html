{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
  <h1>{% if object %}Redaguoti užsakymą{% else %}Sukurti naują užsakymą{% endif %}</h1>

  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success">Išsaugoti pakeitimus</button>
  </form>

  <br>
  <a href="{% url 'my-orders' %}">Atšaukti</a>
{% endblock %}
