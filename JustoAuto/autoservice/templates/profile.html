{% extends 'base.html' %}

{% block title %}Vartotojo profilis{% endblock %}

{% block content %}
<h1>Vartotojo "{{ user.username }}" profilis</h1>
<form method="post">
    {% csrf_token %}
    {% load crispy_forms_tags %}
    {{ form | crispy }}
    <button type="submit" class="btn btn-primary">Išsaugoti</button>
</form>

{% endblock %}
